<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Water Motion - Field App</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2307110e'/%3E%3Cpath d='M32 10c8 10 16 19 16 30a16 16 0 1 1-32 0c0-11 8-20 16-30Z' fill='%235eead4'/%3E%3Cpath d='M24 42c5 4 12 4 17-1' fill='none' stroke='%2307110e' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#fafaf9;font-family:Geist,system-ui,sans-serif;color:#1c1917}
  #app{max-width:390px;margin:0 auto;min-height:100vh;background:#fafaf9}
  .boot-message{padding:28px 22px;line-height:1.5}
  .boot-message h1{font-size:18px;margin:0 0 10px}
  .boot-message p{font-size:14px;color:#78716c;margin:0 0 14px}
  .boot-message code{display:block;background:#fff;border:1px solid #e7e5e1;border-radius:6px;padding:10px 12px;font-size:13px;color:#284dcd}
</style>
</head>
<body>
<div id="app">
  <div class="boot-message">
    <h1>Loading Water Motion...</h1>
    <p>Starting the local app.</p>
  </div>
</div>
<script>
  (function boot() {
    const app = document.getElementById('app');

    if (window.location.protocol === 'file:') {
      app.innerHTML = `
        <div class="boot-message">
          <h1>Run the app through the local server</h1>
          <p>This app loads page partials with fetch, so opening index.html directly will leave the screen blank.</p>
          <code>node server.js</code>
          <p>Then open http://127.0.0.1:3000/</p>
        </div>
      `;
      return;
    }

    const pathName = window.location.pathname;
    const appBase = pathName.endsWith('/')
      ? pathName
      : pathName.includes('.')
        ? pathName.slice(0, pathName.lastIndexOf('/') + 1)
        : '/';
    const appUrl = path => `${appBase}${path}`;
    const cacheBust = Date.now();

    const css = document.createElement('link');
    css.rel = 'stylesheet';
    css.href = `${appUrl('src/css/styles.css')}?v=${cacheBust}`;
    document.head.appendChild(css);

    const scripts = [
      'src/js/icons.js',
      'src/js/state.js',
      'src/js/job-state.js',
      'src/js/i18n.js',
      'src/js/navigation.js',
      'src/js/services/google-drive-client.js',
      'src/js/flows/auth.js',
      'src/js/flows/dashboard.js',
      'src/js/flows/job.js',
      'src/js/flows/preassessment.js',
      'src/js/conversion/engine.js',
      'src/js/flows/assessment.js',
      'src/js/flows/score.js',
      'src/js/flows/payment.js',
      'src/js/flows/feedback.js',
      'src/js/common.js',
      'src/js/page-loader.js',
      'src/js/app.js'
    ];

    scripts.reduce((chain, src) => {
      return chain.then(() => new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = `${appUrl(src)}?v=${cacheBust}`;
        script.onload = resolve;
        script.onerror = () => reject(new Error(`Unable to load ${src}`));
        document.body.appendChild(script);
      }));
    }, Promise.resolve()).catch(error => {
      app.innerHTML = `
        <div class="boot-message">
          <h1>Unable to load app files</h1>
          <p>${error.message}</p>
          <code>node server.js</code>
        </div>
      `;
      console.error(error);
    });
  })();
</script>
</body>
</html>
