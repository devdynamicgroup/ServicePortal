<div id="s-chlorine" class="screen">
  <div class="hdr">
    <button class="hdr-back" type="button" onclick="goBack('s-assess')" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="hdr-title">Chlorine Test</span>
  </div>
  <div class="content gap12">
    <p class="photo-hint">Use the DPD test kit. Compare colour to chart and enter values below.</p>
    <div class="card gap12">
      <div class="row2">
        <div class="field"><label>Free Chlorine (mg/L)</label><input class="inp" id="m-free-cl" type="number" inputmode="decimal" placeholder="0.35"></div>
        <div class="field"><label>Total Chlorine (mg/L)</label><input class="inp" id="m-total-cl" type="number" inputmode="decimal" placeholder="0.45"></div>
      </div>
    </div>
    <div>
      <div style="font-size:13px;font-weight:500;margin-bottom:8px;color:#374151">Test Strip Photo <span style="color:var(--muted);font-weight:400">(optional)</span></div>
      <div class="photo-capture">
        <div class="photo-box" onclick="openCameraCapture('cl-photo-input','cl-photo-preview')">
          <img id="cl-photo-preview" src="" style="display:none" alt="">
          <span class="pb-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#78716c" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
          <span class="pb-label">No test strip photo attached</span>
          <span class="photo-status hidden">Photo added</span>
          <input type="file" id="cl-photo-input" accept="image/*" onchange="previewPhoto(this,'cl-photo-preview')">
        </div>
      </div>
    </div>
  </div>
  <div class="foot">
    <button class="btn btn-ghost" onclick="goBack('s-assess')">Cancel</button>
    <button class="btn btn-primary" onclick="completeSub('chlorine-check','s-assess')">Complete</button>
  </div>
</div>
