<div id="s-feedback" class="screen">
  <div class="hdr">
    <button class="hdr-back" type="button" onclick="goBack('s-job')" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="hdr-title" data-i18n="fb.title">Client Feedback</span>
    <button class="hdr-action" type="button" onclick="shareFeedbackLink()" data-i18n="fb.shareLink">Share Link</button>
  </div>

  <div class="content fb-content">
    <div class="fb-card fb-review-card">
      <p class="fb-question" data-i18n="fb.question">How was your experience?</p>

      <div class="fb-stars-row" id="fb-stars" role="radiogroup" aria-label="Rating">
        <button type="button" class="star-btn" data-rating="1" aria-label="1 star"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.77 6.2 20.36l1.11-6.46-4.7-4.58 6.49-.94L12 2.5z"/></svg></button>
        <button type="button" class="star-btn" data-rating="2" aria-label="2 stars"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.77 6.2 20.36l1.11-6.46-4.7-4.58 6.49-.94L12 2.5z"/></svg></button>
        <button type="button" class="star-btn" data-rating="3" aria-label="3 stars"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.77 6.2 20.36l1.11-6.46-4.7-4.58 6.49-.94L12 2.5z"/></svg></button>
        <button type="button" class="star-btn" data-rating="4" aria-label="4 stars"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.77 6.2 20.36l1.11-6.46-4.7-4.58 6.49-.94L12 2.5z"/></svg></button>
        <button type="button" class="star-btn" data-rating="5" aria-label="5 stars"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.5l2.9 5.88 6.49.94-4.7 4.58 1.11 6.46L12 17.77 6.2 20.36l1.11-6.46-4.7-4.58 6.49-.94L12 2.5z"/></svg></button>
      </div>

      <div class="fb-field">
        <label class="fb-label" for="fb-comment" data-i18n="fb.thoughts">Your thoughts (optional)</label>
        <div class="fb-textarea-wrap">
          <textarea class="inp fb-textarea" id="fb-comment" rows="4" maxlength="1200" data-i18n-placeholder="fb.thoughtsPh" placeholder="What was most helpful about today's visit?"></textarea>
          <button type="button" class="ai-suggest" onclick="aiSuggestFeedback()" data-i18n="fb.aiSuggest">AI Suggest</button>
        </div>
      </div>

      <label class="fb-consent" for="fb-consent">
        <input type="checkbox" id="fb-consent" checked>
        <span class="fb-consent-box" aria-hidden="true"></span>
        <span class="fb-consent-text" data-i18n="fb.consent">I'm happy for Water Motion to use my feedback anonymously. Data may be used for city-wide benchmarking.</span>
      </label>
    </div>
  </div>

  <div class="foot fb-foot">
    <button class="btn btn-secondary btn-complete-narrow" type="button" onclick="completeFeedback()" data-i18n="common.complete">Complete</button>
    <button class="btn btn-primary btn-google" type="button" onclick="openFeedbackModal()" data-i18n="fb.google">Leave Google Review</button>
  </div>
</div>
