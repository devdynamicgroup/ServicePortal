<div id="s-login" class="screen active">
  <div class="login-screen">
    <div class="login-topbar">
      <div class="login-lang">
        <button class="lang-btn sel" type="button" onclick="setLanguage('en')">En</button>
        <button class="lang-btn" type="button" onclick="setLanguage('th')">Th</button>
      </div>
    </div>

    <div class="login-body">
      <div class="login-brand-block">
        <img class="login-logo-img" src="src/assets/icons/logo.svg" data-icon="logo" alt="Water Motion" width="200" height="36">
        <div class="login-brand-text">
          <h1 class="login-headline" data-i18n="login.headline">Know your home's water.</h1>
          <p class="login-subtitle" data-i18n="login.subtitle">Log in to your account</p>
        </div>
      </div>

      <div class="login-form-block">
        <p class="login-msg hidden" id="login-error" role="alert"></p>
        <div class="login-fields">
          <div class="field">
            <label data-i18n="login.username">Username</label>
            <input class="inp" id="l-user" type="text" autocomplete="username" data-i18n-placeholder="login.emailPh" placeholder="Enter your email">
          </div>
          <div class="field">
            <label data-i18n="login.password">Password</label>
            <input class="inp" id="l-pass" type="password" autocomplete="current-password" data-i18n-placeholder="login.passPh" placeholder="Enter your password">
          </div>
        </div>
        <div class="login-cta">
          <button class="btn btn-primary btn-login" type="button" onclick="doLogin()" data-i18n="login.signin">Sign In</button>
          <button class="forgot" type="button" onclick="forgotPassword()" data-i18n="login.forgot">Forgot Password?</button>
        </div>
      </div>
    </div>

    <footer class="login-footer"><span>© 2026 Water Motion</span><span>version 1.0.0</span></footer>
  </div>
</div>
