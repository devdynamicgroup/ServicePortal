     S0 · LOGIN
══════════════════════════════════════ -->
<div id="s-login" class="screen active">
  <div class="login-screen">
    <div class="login-lang">
      <button class="lang-btn sel" type="button" onclick="setLanguage('en')">En</button>
      <button class="lang-btn" type="button" onclick="setLanguage('th')">Th</button>
    </div>
    <div class="login-body">
      <div class="login-brand-block">
        <img class="login-logo-img" src="https://www.figma.com/api/mcp/asset/07f522fa-90f9-426a-a58a-28ffb301712e" alt="Water Motion" width="81" height="32">
        <div>
          <h1 class="login-headline" data-i18n="login.headline">Know your home's water.</h1>
          <p class="login-subtitle" data-i18n="login.subtitle">Log in to your account</p>
        </div>
      </div>
      <div class="login-form-block">
        <div class="login-fields">
          <div class="field"><label data-i18n="login.username">Username</label><input class="inp" id="l-user" type="text" data-i18n-placeholder="login.userPh" placeholder="Enter your username" value="kittichai"></div>
          <div class="field"><label data-i18n="login.password">Password</label><input class="inp" id="l-pass" type="password" data-i18n-placeholder="login.passPh" placeholder="Enter your password" value="password"></div>
          <div class="form-error hidden" id="login-error"></div>
        </div>
        <div class="login-cta">
          <button class="btn btn-primary btn-login" onclick="doLogin()" data-i18n="login.signin">Sign In</button>
          <button class="forgot" type="button" data-i18n="login.forgot">Forgot Password?</button>
        </div>
      </div>
    </div>
    <footer class="login-footer"><span>© 2026 Water Motion</span><span>version 1.0.0</span></footer>
  </div>
</div>
