<div id="s-photo" class="screen">
  <div class="hdr">
    <button class="hdr-back" type="button" onclick="goBack('s-assess')" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="hdr-title">Tap Photo</span>
  </div>
  <div class="content gap12">
    <p class="photo-hint">Take a clear photo of the tap and surrounding area before measuring.</p>
    <div class="photo-capture">
      <div class="photo-box" onclick="openPhotoStudio('tap-photo-input','tap-photo-preview')">
        <img id="tap-photo-preview" src="" style="display:none" alt="">
        <span class="pb-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
        <span class="pb-label" data-i18n="photo.tapHint">Tap to take or upload photo</span>
        <input type="file" id="tap-photo-input" accept="image/*" data-preview-id="tap-photo-preview">
      </div>
    </div>
    <div class="field"><label>Note <span style="color:var(--muted);font-weight:400">(optional)</span></label><textarea class="inp" id="tap-photo-note" placeholder="Any notes about this tap location..."></textarea></div>
  </div>
  <div class="foot">
    <button class="btn btn-ghost" onclick="goBack('s-assess')">Cancel</button>
    <button class="btn btn-primary" onclick="completeSub('tapphoto-check','s-assess')">Complete</button>
  </div>
</div>
