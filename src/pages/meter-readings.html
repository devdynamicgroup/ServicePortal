<div id="s-meter" class="screen">
  <div class="hdr">
    <button class="hdr-back" type="button" onclick="goBack('s-assess')" aria-label="Back"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span class="hdr-title" data-i18n="meter.title">Meter Readings</span>
  </div>
  <div class="content gap12">
    <p class="photo-hint" data-i18n="meter.hint">Photo the meter screen to auto-fill values, or enter readings manually below.</p>
    <div class="photo-capture">
      <div class="photo-box" onclick="openCameraCapture('meter-photo-input','meter-photo-preview')">
        <img id="meter-photo-preview" src="" style="display:none" alt="">
        <span class="pb-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#78716c" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></span>
        <span class="pb-label" data-i18n="photo.noMeter">No meter photo attached</span>
        <span class="photo-status hidden" data-i18n="photo.added">Photo added</span>
        <input type="file" id="meter-photo-input" accept="image/*" data-preview-id="meter-photo-preview">
      </div>
    </div>
    <div id="meter-thumb-section" class="meter-thumb-section hidden">
      <div class="meter-thumb-title" data-i18n="meter.capturedImages">Captured images:</div>
      <div id="meter-thumb-row" class="meter-thumb-row" aria-label="Captured meter images"></div>
    </div>
    <div class="sec-label" data-i18n="meter.formLabel">Enter Readings</div>
    <div class="card gap12">
      <div class="row2">
        <div class="field"><label>pH</label><input class="inp" id="m-ph" type="number" inputmode="decimal" placeholder="7.0"></div>
        <div class="field"><label>TDS (mg/L)</label><input class="inp" id="m-tds" type="number" inputmode="decimal" placeholder="280"></div>
      </div>
      <div class="row2">
        <div class="field"><label>EC (µS/cm)</label><input class="inp" id="m-ec" type="number" inputmode="decimal" placeholder="400"></div>
        <div class="field"><label>Temp (°C)</label><input class="inp" id="m-temp" type="number" inputmode="decimal" placeholder="28"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Turbidity (NTU)</label><input class="inp" id="m-turb" type="number" inputmode="decimal" placeholder="1.2"></div>
        <div class="field"><label>ORP (mV)</label><input class="inp" id="m-orp" type="number" inputmode="decimal" placeholder="320"></div>
      </div>
      <div class="row2">
        <div class="field"><label>DO (mg/L)</label><input class="inp" id="m-do" type="number" inputmode="decimal" placeholder="6.5"></div>
        <div class="field"></div>
      </div>
    </div>
  </div>
  <div class="foot">
    <button class="btn btn-ghost" type="button" onclick="goBack('s-assess')" data-i18n="common.cancel">Cancel</button>
    <button class="btn btn-primary" type="button" onclick="MeterReadingCapture.save()" data-i18n="common.complete">Complete</button>
  </div>
</div>
